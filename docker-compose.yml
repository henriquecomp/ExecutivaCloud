# ExecutivaCloud — https://github.com/henriquecomp/executivacloud
#
# Uso:
#   git clone https://github.com/henriquecomp/executivacloud.git && cd executivacloud
#   docker compose up --build
#
# Acesse o front em http://localhost:8080 e a API em http://localhost:8098/docs
#
# Em servidor público, antes do build defina a URL da API para o navegador:
#   export VITE_API_URL=http://SEU_IP_OU_DOMINIO:8098/
#   docker compose build --no-cache web
# E ajuste CORS_ORIGINS abaixo para a origem do front (ex.: https://app.seudominio.com).

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: executivacloud-api
    ports:
      - "8098:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/sql_app.db
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:80,http://127.0.0.1:80
    volumes:
      - api_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8098/}
    container_name: executivacloud-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
